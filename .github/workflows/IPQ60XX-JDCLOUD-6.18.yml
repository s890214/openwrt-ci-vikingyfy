name: IPQ60XX-JDCLOUD-6.18

on:
  workflow_dispatch:
    inputs:
      WRT_UPLOAD:
        description: '上传方式'
        default: 'release'
        type: choice
        options:
          - release
          - artifact
  # schedule:
  #   - cron: 0 20 * * *

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: IPQ60XX-JDCLOUD
  WRT_SSID: XIAOMI-SONG
  WRT_WORD: ss838218
  WRT_IP: 192.168.1.1
  WRT_REPO: https://github.com/VIKINGYFY/immortalwrt.git
  WRT_BRANCH: main
  WRT_SOURCE: VIKINGYFY/immortalwrt

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          WRT_DATE_VALUE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")
          echo "WRT_DATE=$WRT_DATE_VALUE" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_TAG=${WRT_CONFIG%%-*}-${WRT_SOURCE%%/*}-$WRT_DATE_VALUE" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi



      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: Download Packages
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Machine Information
        if: always()
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        if: success()
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_DATE".txt

          echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
          echo "WRT_LIST=$(find ./bin/targets/ -type f -name '*.manifest' -exec grep -oP '^luci-app[^ ]*' {} \; | grep -vE 'argon-config|aurora-config' | tr '\n' ' ')" >> $GITHUB_ENV

          find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

          for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*" -not -name "*.manifest") ; do
            EXT=$(basename $FILE | cut -d '.' -f 2-)
            ORIG=$(basename $FILE ."$EXT")
            TYPE=$(echo "$ORIG" | grep -io 'factory\|sysupgrade\|kernel\|rootfs\|combined' | head -1)
            DEV=$(echo "$ORIG" | sed 's/^[^-]*-[^-]*-//' | sed 's/-squashfs-.*//')
            NEW_FILE="$DEV-$TYPE-$WRT_INFO-$WRT_DATE.$EXT"
            mv -f $FILE ./upload/$NEW_FILE
          done

          for FILE in $(find ./bin/targets/ -type f -name "*.manifest") ; do
            mv -f $FILE ./upload/$WRT_INFO-$WRT_DATE.manifest
          done

      - name: Release Firmware
        if: success() && inputs.WRT_UPLOAD == 'release'
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_TAG}}
          files: ./wrt/upload/*.*
          body: |
            ### 📒 固件信息
            - 💻 设备：JDCloud AX6600 (RE-CS-02)
            - ⚽ 源码：${{env.WRT_REPO}}
            - 💝 分支：${{env.WRT_BRANCH}}
            - 🔄 提交：${{env.WRT_HASH}}
            - 🌐 默认地址：${{env.WRT_IP}}

            ### 🧊 固件版本
            - 内核版本：${{env.WRT_KVER}}
            - 编译日期：${{env.WRT_DATE}}

            ### 📦 插件列表
            ${{env.WRT_LIST}}

      - name: Upload Firmware To Artifact
        if: success() && inputs.WRT_UPLOAD == 'artifact'
        uses: actions/upload-artifact@main
        with:
          name: ${{env.WRT_TAG}}
          path: ./wrt/upload/*.*

      - name: Firmware Summary
        if: success()
        run: |
          echo "### 📒 固件信息" >> $GITHUB_STEP_SUMMARY
          echo "- 💻 设备：JDCloud AX6600 (RE-CS-02)" >> $GITHUB_STEP_SUMMARY
          echo "- ⚽ 源码：${WRT_REPO}" >> $GITHUB_STEP_SUMMARY
          echo "- 💝 分支：${WRT_BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 提交：${WRT_HASH}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 默认地址：${WRT_IP}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧊 固件版本" >> $GITHUB_STEP_SUMMARY
          echo "- 内核版本：${WRT_KVER}" >> $GITHUB_STEP_SUMMARY
          echo "- 编译日期：${WRT_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 插件列表" >> $GITHUB_STEP_SUMMARY
          echo "${WRT_LIST}" >> $GITHUB_STEP_SUMMARY

      - name: Delete Old Cache
        if: success()
        run: |
          echo "========cache status========"
          echo "ccache: $(du -sh ./wrt/.ccache 2>/dev/null | cut -f 1 || echo 'none')"
          echo "staging: $(du -sh ./wrt/staging_dir 2>/dev/null | cut -f 1 || echo 'none')"

          echo "cleanup old caches..."
          CURRENT_KEY="$WRT_CONFIG-$WRT_INFO-$WRT_HASH"
          gh cache list --key "$WRT_CONFIG-$WRT_INFO" --json id,key --jq '.[] | "\(.id) \(.key)"' | while read -r ID KEY; do
            if [ -z "$ID" ]; then continue; fi
            if [ "$KEY" = "$CURRENT_KEY" ]; then
              echo "keeping current cache: $ID ($KEY)"
            else
              gh cache delete "$ID"
              echo "deleted old cache: $ID ($KEY)"
            fi
          done
          echo "caches cleanup done!"

      - name: Clean Old Releases
        if: success() && inputs.WRT_UPLOAD == 'release'
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{secrets.GITHUB_TOKEN}}
          delete_releases: true
          releases_keep_latest: 5
          delete_tags: true
